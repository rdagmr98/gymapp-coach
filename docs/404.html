<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GymCoachPro</title>
  <script>
    var segment = '';
    if (window.location.pathname !== '/') {
      segment = window.location.pathname.split('/').pop();
    }
    sessionStorage.redirect = segment || '/';
    window.location.href = '/';
  </script>
</head>
<body></body>
</html>
