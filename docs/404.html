<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GymCoachPro</title>
  <script>
    var pathname = window.location.pathname;
    var baseUrl = '/gymapp-coach/docs/';
    if (!pathname.startsWith(baseUrl)) {
      var segment = pathname.replace(/^\/gymapp-coach\/docs\//, '');
      sessionStorage.redirect = segment || '/';
      window.location.href = baseUrl;
    }
  </script>
</head>
<body></body>
</html>
